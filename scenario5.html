<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情境 5：照顧病人的你，誰來照顧？</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --terracotta: #B85042;
      --terracotta-deep: #8C3A2F;
      --sand-dark: #D5D6BC;
      --cream: #FAF8F0;
      --warm-white: #FEFCF6;
      --brown: #5C3D2E;
      --text-primary: #3A2820;
      --text-secondary: #6B5548;
      --text-muted: #9A8578;
      --sage-muted: #C4D5CB;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { font-size: 16px; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--cream);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    .site-header {
      background: linear-gradient(135deg, var(--brown) 0%, var(--terracotta-deep) 50%, var(--terracotta) 100%);
      color: #fff;
      padding: 2.2rem 1.2rem 2.8rem;
      position: relative;
      text-align: center;
    }

    .site-header::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 42px;
      background: var(--cream);
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    .header-link {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      font-size: .92rem;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      padding: .42rem .95rem;
      background: rgba(255,255,255,0.08);
      margin-bottom: 1.15rem;
      max-width: 100%;
      flex-wrap: wrap;
      justify-content: center;
      text-align: center;
    }

    .header-title {
      font-family: 'Noto Serif TC', serif;
      font-size: clamp(1.6rem, 4.2vw, 2.4rem);
      font-weight: 900;
      line-height: 1.35;
    }

    .main-content {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.4rem 1.2rem 3.4rem;
      position: relative;
      z-index: 1;
    }

    .prompt-card {
      background: var(--warm-white);
      border: 1px solid var(--sand-dark);
      border-radius: 16px;
      box-shadow: 0 6px 22px rgba(92, 61, 46, 0.08);
      padding: 1.35rem;
      line-height: 1.8;
      color: var(--text-secondary);
      margin-bottom: 1.3rem;
      overflow-wrap: anywhere;
    }

    .question {
      color: var(--text-primary);
      font-family: 'Noto Serif TC', serif;
      font-size: 1.08rem;
      font-weight: 700;
      margin-top: .8rem;
      line-height: 1.7;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: .85rem;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      display: flex;
      align-items: flex-start;
      gap: .85rem;
      border: 1px solid var(--sand-dark);
      border-radius: 14px;
      padding: .95rem 1rem;
      background: var(--warm-white);
      color: var(--text-primary);
      transition: all .2s ease;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1.65;
    }

    .option-text {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .option-btn:hover {
      border-color: var(--terracotta);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(184, 80, 66, 0.15);
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .radio-circle {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--text-muted);
      flex-shrink: 0;
      margin-top: 2px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .option-btn.selected {
      border-color: var(--terracotta);
      background: #fff4f1;
      box-shadow: 0 6px 16px rgba(184, 80, 66, 0.15);
      opacity: 1;
    }

    .option-btn.selected .radio-circle {
      border-color: var(--terracotta);
    }

    .loading {
      text-align: center;
      color: var(--text-muted);
      padding: 1rem;
      border: 1px dashed var(--sage-muted);
      border-radius: 14px;
      background: var(--warm-white);
    }

    @media (max-width: 640px) {
      .site-header { padding: 1.8rem 1rem 2.4rem; }
      .header-link { width: 100%; max-width: 22rem; margin-inline: auto; }
      .main-content { padding: 2rem 0.9rem 2.8rem; }
      .prompt-card p br,
      .question br { display: none; }
      .option-btn { padding: 0.9rem; font-size: 0.95rem; }
    }

    @media (max-width: 420px) {
      .header-title { font-size: 1.35rem; }
      .option-btn { gap: 0.6rem; }
      .radio-circle { width: 20px; height: 20px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="header-link" href="https://sheila21928-ikea.github.io/1150407CEC/">← 全院倫理與法律委員會</a>
    <h1 class="header-title">情境 5：照顧病人的你，誰來照顧？</h1>
  </header>

  <main class="main-content">
    <section class="prompt-card">
      <p>在面對這類複雜且高壓的醫病溝通與倫理困境時，第一線醫療人員往往承受巨大的心理壓力與道德折磨（Moral Distress）。在這個案例中，醫療團隊承受了來自家屬的言語威脅、<br>情緒壓力、甚至被歸咎的風險。</p>
      <p class="question">如果你是團隊的一員，面對這樣的「道德困擾」(Moral Distress)，你最需要的支持是什麼？<br>什麼樣的團隊支持會讓您覺得「比較有力量繼續走下去」？</p>
    </section>

    <div id="options-container" class="options">
      <div class="loading" id="loading-text">載入選項中...</div>
    </div>
  </main>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbx0ZfK4-vfsGzXpWUPUPNdnGtX3Bswmmr8cE_VCRvHTsAdgBrTPtWl5YazmANtBi6Fbsw/exec";

    const fallbackOptions = [
      "[ Option A ]：有主管或資深同事在關鍵時刻願意一起面對家屬，不讓我獨自承擔",
      "[ Option B ]：有完整的病歷記錄與團隊共識，讓我知道「我們走在一條互相扶持的道路上」",
      "[ Option C ]：事後有人關心我的感受，例如團隊 debriefing 或心理支持",
      "[ Option D ]：以上皆是——照顧病人的人，也需要被接住"
    ];

    document.addEventListener("DOMContentLoaded", () => {
      fetchOptions();
    });

    async function fetchOptions() {
      try {
        const response = await fetch(scriptURL);
        const result = await response.json();

        if (result.status === "success" && result.data && result.data.length > 0) {
          let options = Object.keys(result.data[0]);

          if (options.length > 0 && !options[0].includes("Option")) {
            options = Object.values(result.data[0]);
          }
          renderButtons(options);
        } else {
          renderButtons(fallbackOptions);
        }
      } catch (error) {
        console.error("從 Google Sheet 讀取選項失敗，使用備用選項:", error);
        renderButtons(fallbackOptions);
      }
    }

    function renderButtons(options) {
      const container = document.getElementById('options-container');
      container.innerHTML = '';

      options.forEach((optionText) => {
        if (!optionText || optionText.trim() === "") return;

        const btn = document.createElement('button');
        btn.className = "option-btn";

        btn.innerHTML = `
          <span class="radio-circle"></span>
          <span class="option-text">${optionText}</span>
        `;

        btn.onclick = () => submitAnswer(optionText, btn);
        container.appendChild(btn);
      });
    }

    async function submitAnswer(selectedOption, clickedBtn) {
      const buttons = document.querySelectorAll('#options-container button');

      buttons.forEach(b => {
        b.disabled = true;
      });

      clickedBtn.classList.add('selected');
      const radioCircle = clickedBtn.querySelector('.radio-circle');
      if (radioCircle) {
        radioCircle.innerHTML = '<div style="height:10px;width:10px;background:#B85042;border-radius:50%"></div>';
      }

      const textEl = clickedBtn.querySelector('.option-text');
      const originalText = textEl.innerText;
      textEl.innerText = "記錄回覆中，請稍候...";

      try {
        const response = await fetch(scriptURL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8",
          },
          body: JSON.stringify({
            ID: "Scenario_5",
            User_Choice: selectedOption
          })
        });

        const result = await response.json();

        if (result.status === "success") {
          alert("回覆已成功記錄！感謝您的參與。");
          window.location.href = "https://sheila21928-ikea.github.io/1150407CEC/";
        } else {
          alert("發生錯誤：" + result.message);
          resetButtons(buttons, clickedBtn, originalText);
        }
      } catch (error) {
        console.error("提交失敗:", error);
        alert("提交失敗，請檢查網路連線或稍後再試。");
        resetButtons(buttons, clickedBtn, originalText);
      }
    }

    function resetButtons(buttons, clickedBtn, originalText) {
      buttons.forEach(b => {
        b.disabled = false;
        b.classList.remove('selected');
        const radioCircle = b.querySelector('.radio-circle');
        if (radioCircle) {
          radioCircle.innerHTML = '';
        }
      });
      if (clickedBtn) {
        clickedBtn.querySelector('.option-text').innerText = originalText;
      }
    }
  </script>
</body>
</html>
