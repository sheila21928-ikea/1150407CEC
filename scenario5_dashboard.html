<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>醫學倫理情境五：決策結果儀表板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
  :root {
    --terracotta: #B85042;
    --terracotta-deep: #8C3A2F;
    --sand: #E7E8D1;
    --sand-dark: #D5D6BC;
    --cream: #FAF8F0;
    --warm-white: #FEFCF6;
    --brown: #5C3D2E;
    --text-primary: #3A2820;
    --text-secondary: #6B5548;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream);
    color: var(--text-primary);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .site-header {
    position: relative;
    background: linear-gradient(135deg, var(--brown) 0%, var(--terracotta-deep) 50%, var(--terracotta) 100%);
    padding: 2.5rem 1.5rem 3.2rem;
    text-align: center;
    overflow: hidden;
  }

  .site-header::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    right: 0;
    height: 54px;
    background: var(--cream);
    clip-path: ellipse(55% 100% at 50% 100%);
  }

  .header-badge {
    display: inline-block;
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.85);
    border-radius: 999px;
    padding: 0.38rem 1rem;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
    background: rgba(255,255,255,0.08);
  }

  .site-title {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(1.8rem, 4.2vw, 2.7rem);
    color: #fff;
    line-height: 1.35;
    margin-bottom: 0.5rem;
  }

  .site-subtitle {
    font-family: 'Noto Serif TC', serif;
    color: rgba(255,255,255,0.76);
    font-size: clamp(0.95rem, 1.8vw, 1.05rem);
  }

  .main-content {
    max-width: 1040px;
    margin: 0 auto;
    padding: 2.2rem 1.2rem 3rem;
  }

  .dashboard-card {
    background: var(--warm-white);
    border: 1px solid var(--sand-dark);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(92,61,46,0.1);
    padding: 1.4rem;
  }

  .toolbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 1rem;
  }

  .refresh-btn {
    border: 1px solid transparent;
    background: linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-deep) 100%);
    color: #fff;
    border-radius: 10px;
    padding: 0.62rem 1rem;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 14px rgba(140,58,47,0.28);
  }

  .refresh-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 20px rgba(140,58,47,0.35);
  }

  .chart-wrap {
    position: relative;
    height: min(60vh, 520px);
    min-height: 320px;
  }

  @media (max-width: 768px) {
    .dashboard-card { padding: 1rem; }
    .chart-wrap { height: 52vh; }
  }
</style>
</head>
<body>
  <header class="site-header">
    <div class="header-badge">SCENARIO 5 DASHBOARD</div>
    <h1 class="site-title">情境五：醫療團隊支持即時統計</h1>
    <p class="site-subtitle">生命的重量，抉擇的天平 · 即時投票概覽</p>
  </header>

  <main class="main-content">
    <section class="dashboard-card">
      <div class="toolbar">
        <button type="button" class="refresh-btn" onclick="fetchAndRenderData()" aria-label="手動更新數據">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
          手動更新數據
        </button>
      </div>
      <div class="chart-wrap">
        <canvas id="responsesChart"></canvas>
      </div>
    </section>
  </main>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyCgwZYGlCituD6Z664mxjNgjObhbfIPJLdvQtsWRgEa_pgGrN0F9BC5PtfcskOFyGKOA/exec?action=getStats";
    let myChart = null;

    async function fetchAndRenderData() {
      try {
        const response = await fetch(GAS_URL);
        const json = await response.json();
        const stats = json.data;

        const ctx = document.getElementById('responsesChart').getContext('2d');
        if (myChart !== null) {
          myChart.destroy();
        }

        myChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: [
              '【Option A】主管資深同事共擔',
              '【Option B】完整病歷與團隊共識',
              '【Option C】事後關懷與心理支持',
              '【Option D】以上皆是 (需要被接住)'
            ],
            datasets: [{
              label: '選擇人數',
              data: [stats["Option A"] || 0, stats["Option B"] || 0, stats["Option C"] || 0, stats["Option D"] || 0],
              backgroundColor: ['rgba(184, 80, 66, 0.75)', 'rgba(122, 158, 137, 0.75)', 'rgba(184, 169, 79, 0.75)', 'rgba(122, 90, 74, 0.75)'],
              borderColor: ['rgb(184, 80, 66)', 'rgb(122, 158, 137)', 'rgb(184, 169, 79)', 'rgb(122, 90, 74)'],
              borderWidth: 1,
              borderRadius: 6
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false }
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  stepSize: 1,
                  font: { size: 18 }
                }
              },
              x: {
                ticks: {
                  font: { size: 14 }
                }
              }
            }
          }
        });
      } catch (error) {
        console.error('讀取資料發生錯誤:', error);
      }
    }

    fetchAndRenderData();
    setInterval(fetchAndRenderData, 10000);
  </script>
</body>
</html>
