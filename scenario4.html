<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情境 4：資源與現實的妥協</title>
  <!-- 引入 Tailwind CSS 以快速排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  
  <!-- 頂部導覽列：返回原網站 -->
  <nav class="bg-white px-4 py-3 shadow-sm flex items-center sticky top-0 z-10">
    <a href="https://sheila21928-ikea.github.io/1150407CEC/" class="text-blue-600 hover:text-blue-800 flex items-center text-sm font-medium transition-colors">
      <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
      </svg>
      全院倫理與法律委員會
    </a>
  </nav>

  <!-- 主要內容區塊 -->
  <main class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-5">情境 4：資源與現實的妥協</h1>
    
    <!-- 情境描述 -->
    <div class="bg-white rounded-xl shadow-sm p-6 mb-8 text-gray-700 leading-relaxed border border-gray-100">
      <p class="mb-3">一位高齡且患有多重慢性病的阿嬤，近期因肺炎住院治療。目前病情已經穩定，醫療團隊評估已達出院標準。然而，阿嬤長期獨居在熟悉的「廟裡廂房」，家屬因為經濟困境與工作繁忙，無法提供全天候的照護，因此對阿嬤出院後的安排感到極度焦慮，不願辦理出院。</p>
      <p>同時，醫院的急性病房面臨嚴重的滿床壓力，急診還有許多重症病患正在苦苦等候床位。</p>
      <p class="mt-4 font-semibold text-gray-900 text-lg">面對醫院床位周轉壓力與家屬的現實照護困境，您認為醫療團隊最適當的處置為何？</p>
    </div>

    <!-- 選項區：將透過 JavaScript 動態載入 -->
    <div id="options-container" class="flex flex-col gap-4">
      <div class="text-center text-gray-500 py-8 flex flex-col items-center justify-center" id="loading-text">
        <svg class="animate-spin h-8 w-8 text-blue-500 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>載入選項中...</span>
      </div>
    </div>
  </main>

  <script>
    // 專屬於 Scenario 4 的 Google Apps Script 網址
    const scriptURL = "https://script.google.com/macros/s/AKfycbznKlDS0b7DdvnkoazkWYuZVFPQ5IdspsFuk29xlyHrpMCHjXEHmBjP9L6WSNAKG8KMRQ/exec";
    
    // 若 GAS 讀取失敗時的備用選項 (依照 Scenario 4 的 CSV 資料設定)
    const fallbackOptions = [
      "【Option A】：讓阿嬤無限期住在急性病房，直到家屬找到完美的解決方案",
      "【Option B】：強迫家屬把阿嬤帶回家，這是家屬的責任，醫院床位要留給別人",
      "【Option C】：啟動安寧居家資源，協助安排回熟悉的「廟裡廂房」，延長居服員陪伴時間"
    ];

    // 網頁載入完成後執行
    document.addEventListener("DOMContentLoaded", () => {
      fetchOptions();
    });

    // --- 1. 從 Google Apps Script 讀取選項 ---
    async function fetchOptions() {
      try {
        const response = await fetch(scriptURL);
        const result = await response.json();
        
        if (result.status === "success" && result.data && result.data.length > 0) {
          // 動態讀取 CSV 第一列的所有標題或內容
          let options = Object.keys(result.data[0]); 
          
          if (options.length > 0 && !options[0].includes("Option")) {
              options = Object.values(result.data[0]);
          }
          renderButtons(options);
        } else {
          renderButtons(fallbackOptions);
        }
      } catch (error) {
        console.error("從 Google Sheet 讀取選項失敗，使用備用選項:", error);
        renderButtons(fallbackOptions);
      }
    }

    // --- 2. 渲染按鈕到畫面上 ---
    function renderButtons(options) {
      const container = document.getElementById('options-container');
      container.innerHTML = ''; // 清除載入動畫
      
      options.forEach((optionText, index) => {
        if (!optionText || optionText.trim() === "") return;

        const btn = document.createElement('button');
        btn.className = "w-full text-left bg-white border-2 border-transparent hover:border-blue-400 hover:bg-blue-50 hover:shadow-md rounded-2xl p-5 shadow-sm transition-all duration-200 text-gray-800 text-base md:text-lg relative group flex items-start focus:outline-none";
        
        btn.innerHTML = `
          <span class="flex-shrink-0 h-6 w-6 rounded-full border-2 border-gray-300 mr-4 group-hover:border-blue-500 flex items-center justify-center mt-0.5 transition-colors duration-200"></span>
          <span class="leading-relaxed font-medium">${optionText}</span>
        `;
        
        btn.onclick = () => submitAnswer(optionText, btn);
        container.appendChild(btn);
      });
    }

    // --- 3. 傳送使用者的選擇回 Google Apps Script ---
    async function submitAnswer(selectedOption, clickedBtn) {
      const buttons = document.querySelectorAll('#options-container button');
      
      // 鎖定按鈕防止重複點擊
      buttons.forEach(b => {
        b.disabled = true;
        b.classList.add('opacity-50', 'cursor-not-allowed');
      });
      
      // 按鈕選取狀態
      clickedBtn.classList.remove('opacity-50', 'border-transparent');
      clickedBtn.classList.add('border-blue-500', 'bg-blue-50', 'opacity-100', 'shadow-md');
      const radioCircle = clickedBtn.querySelector('span.rounded-full');
      if (radioCircle) {
         radioCircle.classList.replace('border-gray-300', 'border-blue-500');
         radioCircle.innerHTML = '<div class="h-3 w-3 bg-blue-500 rounded-full"></div>';
      }

      const originalText = clickedBtn.querySelector('span.leading-relaxed').innerText;
      clickedBtn.querySelector('span.leading-relaxed').innerText = "記錄回覆中，請稍候...";

      try {
        const response = await fetch(scriptURL, {
          method: "POST",
          headers: {
            // 使用 text/plain 避免 CORS 問題
            "Content-Type": "text/plain;charset=utf-8", 
          },
          body: JSON.stringify({
            ID: "Scenario_4", // 設定 ID 為 Scenario 4
            User_Choice: selectedOption
          })
        });
        
        const result = await response.json();
        
        if (result.status === "success") {
          alert("回覆已成功記錄！感謝您的參與。");
          // 導回主選單頁面
          window.location.href = "https://sheila21928-ikea.github.io/1150407CEC/";
        } else {
          alert("發生錯誤：" + result.message);
          resetButtons(buttons, clickedBtn, originalText);
        }
      } catch (error) {
        console.error("提交失敗:", error);
        alert("提交失敗，請檢查網路連線或稍後再試。");
        resetButtons(buttons, clickedBtn, originalText);
      }
    }

    // --- 錯誤還原機制 ---
    function resetButtons(buttons, clickedBtn, originalText) {
      buttons.forEach(b => {
        b.disabled = false;
        b.classList.remove('opacity-50', 'cursor-not-allowed', 'border-blue-500', 'bg-blue-50', 'shadow-md');
        b.classList.add('border-transparent');
        const radioCircle = b.querySelector('span.rounded-full');
        if (radioCircle) {
           radioCircle.classList.replace('border-blue-500', 'border-gray-300');
           radioCircle.innerHTML = '';
        }
      });
      if(clickedBtn) {
        clickedBtn.querySelector('span.leading-relaxed').innerText = originalText;
      }
    }
  </script>
</body>
</html>
